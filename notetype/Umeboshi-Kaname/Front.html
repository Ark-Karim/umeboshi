<script>
// ##############  UMEBOSHI LOCAL STORAGE (v2 - ClaudeFlare)  ##############
// Umeboshi KanameノートタイプのlocalStorage管理モジュール

var UmeboshiStorage = (function() {
  var STORAGE_KEY = 'umeboshi';     // localStorageのキー名
  var SCHEMA_VERSION = 2;           // 現在のスキーマバージョン

  // === デフォルトのlocalStorage構造（v2） ===
  function getDefaults() {
    return {
      version: SCHEMA_VERSION,
      claudeflareToken: '',          // ClaudeFlare API認証トークン
      claudeflareUrl: 'https://umeboshi-claudeflare.YOUR_CLOUDFLARE_SUBDOMAIN.workers.dev',
      ui: {
        fontSize: 28,                // フォントサイズ（px）
        countdownEnabled: true,      // 脳休憩カウントダウン表示
        llmEnabled: true,            // LLM機能
        thinkingEnabled: false,      // Thinking表示
        autoFlip: true,              // 自動めくり（表面スキップ）
        ttsEnabled: false,           // TTS読み上げ
        countdownBrainRestSec: 3,    // 脳休憩カウントダウン秒数
        easySecond: 5,               // タイミングドット: 青〇の秒数閾値
        hardSecond: 10,              // タイミングドット: オレンジ〇の秒数閾値
        rubyLang: 'en',              // ルビ表示言語: 'en'=英語デフォルト, 'ja'=日本語デフォルト
        rubyDelaySec: 0,             // ルビ遅延表示の秒数（0 = 即時表示）
      },
      hints: {
        autoRevealHints: {},         // ヒント自動表示設定
      },
      syncedAt: ''                   // 最終同期日時
    };
  }

  // === ディープマージユーティリティ ===
  // ネストされたオブジェクトをマージ（スキーマは固定深度のため非再帰）
  function deepMerge(target, source) {
    var result = JSON.parse(JSON.stringify(target));
    for (var key in source) {
      if (source.hasOwnProperty(key)) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])
            && result[key] && typeof result[key] === 'object' && !Array.isArray(result[key])) {
          Object.assign(result[key], source[key]);
        } else {
          result[key] = source[key];
        }
      }
    }
    return result;
  }

  // === v1 → v2マイグレーション ===
  function migrateV1toV2(data) {
    if (!data) return getDefaults();

    // v1検出: githubTokenまたはllm.providerが存在
    var isV1 = data.githubToken || (data.llm && data.llm.provider);
    if (!isV1) return data;

    // v2構造に変換（ui/hintsは既存値をマージ）
    var migrated = {
      version: 2,
      claudeflareToken: '',
      claudeflareUrl: 'https://umeboshi-claudeflare.YOUR_CLOUDFLARE_SUBDOMAIN.workers.dev',
      ui: deepMerge(getDefaults().ui, data.ui || {}),
      hints: deepMerge(getDefaults().hints, data.hints || {}),
      syncedAt: ''
    };

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      console.log('UmeboshiStorage: Migrated v1 → v2 (ClaudeFlare)');
    } catch (e) {
      console.error('UmeboshiStorage: Migration failed', e);
    }

    return migrated;
  }

  // === localStorageから読み込み（デフォルト値とマージ） ===
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);

      // v1データの自動マイグレーション
      if (parsed.version === 1 || parsed.githubToken || (parsed.llm && parsed.llm.provider)) {
        parsed = migrateV1toV2(parsed);
      }

      return deepMerge(getDefaults(), parsed);
    } catch (e) {
      console.error('UmeboshiStorage: Failed to load', e);
      return null;
    }
  }

  // === localStorageに保存 ===
  function save(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      return true;
    } catch (e) {
      console.error('UmeboshiStorage: Failed to save', e);
      return false;
    }
  }

  // === ドットパスでネストされた値を取得（例: 'ui.fontSize'） ===
  function get(path) {
    var data = load();
    if (!data) return undefined;
    var parts = path.split('.');
    var current = data;
    for (var i = 0; i < parts.length; i++) {
      if (current === undefined || current === null) return undefined;
      current = current[parts[i]];
    }
    return current;
  }

  // === ドットパスでネストされた値を設定 ===
  function set(path, value) {
    var data = load() || getDefaults();
    var parts = path.split('.');
    var current = data;
    for (var i = 0; i < parts.length - 1; i++) {
      current = current[parts[i]];
    }
    current[parts[parts.length - 1]] = value;
    return save(data);
  }

  // === 初期化（データがなければデフォルトで作成） ===
  function init() {
    var existing = load();
    if (!existing) {
      return save(getDefaults());
    }
    return true;
  }

  // === 初期化済みチェック ===
  function isInitialized() {
    return load() !== null;
  }

  // === ClaudeFlareトークン設定済みチェック ===
  function hasToken() {
    var data = load();
    return data && data.claudeflareToken && data.claudeflareToken.length > 0;
  }

  // === 公開API ===
  return {
    load: load,
    save: save,
    get: get,
    set: set,
    init: init,
    isInitialized: isInitialized,
    hasToken: hasToken,
    getDefaults: getDefaults,
    STORAGE_KEY: STORAGE_KEY
  };
})();
</script>

<!-- Anki Persistence (MIT): Front↔Back間データ保持 (sessionStorage only) -->
<!-- https://github.com/SimonLammer/anki-persistence -->

<script>
if (typeof(window.Persistence) === 'undefined') {
  var _persistenceKey = 'github.com/SimonLammer/anki-persistence/';
  var _defaultKey = '_default';

  window.Persistence = {
    clear: function() {
      for (var i = 0; i < sessionStorage.length; i++) {
        var k = sessionStorage.key(i);
        if (k.indexOf(_persistenceKey) == 0) {
          sessionStorage.removeItem(k);
          i--;
        }
      }
    },
    setItem: function(key, value) {
      if (value == undefined) {
        value = key;
        key = _defaultKey;
      }
      sessionStorage.setItem(_persistenceKey + key, JSON.stringify(value));
    },
    getItem: function(key) {
      if (key == undefined) {
        key = _defaultKey;
      }
      return JSON.parse(sessionStorage.getItem(_persistenceKey + key));
    },
    removeItem: function(key) {
      if (key == undefined) {
        key = _defaultKey;
      }
      sessionStorage.removeItem(_persistenceKey + key);
    },
    getAllKeys: function() {
      var keys = [];
      var prefixedKeys = Object.keys(sessionStorage);
      for (var i = 0; i < prefixedKeys.length; i++) {
        var k = prefixedKeys[i];
        if (k.indexOf(_persistenceKey) == 0) {
          keys.push(k.substring(_persistenceKey.length, k.length));
        }
      }
      return keys.sort();
    },
    isAvailable: function() {
      try { return typeof(window.sessionStorage) === 'object'; } catch(e) { return false; }
    }
  };
}
</script>

    }

    function delayedProcessSelective1b1() {
      if (window.requestAnimationFrame) window.requestAnimationFrame(processSelective1b1); // less flickering
      else window.setTimeout(processSelective1b1, 0);
    };
    if (globalThis.onUpdateHook) {
      onUpdateHook.push(delayedProcessSelective1b1);
    }
    else if (document.readyState === "complete") {
        delayedProcessSelective1b1();
    }
    else {
      document.addEventListener("DOMContentLoaded", delayedProcessSelective1b1);
    }
  }
  Persistence.setItem("clozeHints", clozeHints);
</script>

<!-- ショートカットキーマッチング関数 -->
<script>
  // 特殊文字→keyCode変換テーブル
  var specialCharCodes = {
    "-": "minus",
    "=": "equal",
    "[": "bracketleft",
    "]": "bracketright",
    ";": "semicolon",
    "'": "quote",
    "`": "backquote",
    "\\": "backslash",
    ",": "comma",
    ".": "period",
    "/": "slash",
  };

  /**
   * ショートカット文字列 (例: "Ctrl+Shift+N") を受け取り、
   * キーボードイベントがマッチするか判定する関数を返す
   */
  function shortcutMatcher(shortcut) {
    if (!shortcut) return function() { return false; };
    // "Ctrl+Shift+N" → ["ctrl", "shift", "n"]
    let shortcutKeys = shortcut.toLowerCase().split(/[+]/).map(key => key.trim())
    let mainKey = shortcutKeys[shortcutKeys.length - 1]
    const mainKeyVariants = [];

    // 主キーのcode変換
    if (mainKey.length === 1) {
      if (/\d/.test(mainKey)) {
        // 数字キー: digit系とnumpad系の両方をマッチ
        mainKeyVariants.push("digit" + mainKey)
        mainKeyVariants.push("numpad" + mainKey)
      } else if (/[a-zA-Z]/.test(mainKey)) {
        // アルファベット: key系
        mainKeyVariants.push("key" + mainKey)
      } else {
        // 特殊文字: テーブルで変換
        let code = specialCharCodes[mainKey];
        if (code) {
          mainKey = code
          mainKeyVariants.push(code)
        } else {
          mainKeyVariants.push(mainKey)
        }
      }
    } else {
      // 複数文字 (例: "Escape", "Enter")
      mainKeyVariants.push(mainKey)
    }

    // 修飾キーの状態を取得
    let ctrl = shortcutKeys.includes("ctrl")
    let shift = shortcutKeys.includes("shift")
    let alt = shortcutKeys.includes("alt")

    // イベントマッチ関数を生成して返す
    let matchShortcut = function (ctrl, shift, alt, mainKeyVariants, event) {
      if (!mainKeyVariants.includes(event.code.toLowerCase())) return false
      if (ctrl !== (event.ctrlKey || event.metaKey)) return false
      if (shift !== event.shiftKey) return false
      if (alt !== event.altKey) return false
      return true
    }.bind(window, ctrl, shift, alt, mainKeyVariants)

    return matchShortcut
  }
</script>

<!-- BEGIN WRAPPER CODE shuffle — 順序シャッフル機能 -->

<script>
    (() => {
        // === セレクタの設定 ===
        const selectors = [".shuffle"];
        // 保存済みのシャッフルマップを読み込み
        const shuffleMap = Persistence.getItem("shuffle") || {};
        const containerSelector = selectors.join(", ");

        // === フロント/バック判定 ===
        function isFront() {
            const hasHrMarker = document.querySelector("hr[id=answer]");
            const hasClozeFieldClass = document.querySelector(".clozefield");
            return !hasHrMarker && !hasClozeFieldClass;
        }

        // === Fisher-Yatesシャッフル（indexMapで順序を固定） ===
        function shuffle(array, indexMap) {
            let currentIndex = array.length;
            while (currentIndex != 0) {
                currentIndex--;
                // 既存のマップがあれば同じ順序、なければ新規ランダム
                let randomIndex = indexMap[currentIndex] !== undefined ? indexMap[currentIndex] : Math.floor(Math.random() * (currentIndex + 1));
                indexMap[currentIndex] = randomIndex;
                [array[currentIndex], array[randomIndex]] = [
                    array[randomIndex],
                    array[currentIndex],
                ];
            }
        }

        // === 親要素の中で最も近いID付き要素を取得 ===
        function getNearestIdElement(element) {
            let current = element;
            while (current && current !== document.body) {
                if (current.id) {
                    return current;
                }
                current = current.parentElement;
            }
            return null;
        }

        // === スコープ内でのインデックスを取得 ===
        function getScopedIndex(element, selector) {
            const scope = getNearestIdElement(element);
            const candidates = scope
                ? Array.from(scope.querySelectorAll(selector))
                : Array.from(document.querySelectorAll(selector));
            const index = candidates.indexOf(element);
            return index === -1 ? 0 : index;
        }

        // === シャッフルマップのキーを生成 ===
        function shuffleKey(element, groupType, selector) {
            const scope = getNearestIdElement(element);
            const scopeKey = scope ? `${scope.tagName.toLowerCase()}#${scope.id}` : "document";
            const index = selector ? getScopedIndex(element, selector) : 0;
            return `${scopeKey}:${groupType}:${index}`;
        }

        // === 要素配列をシャッフルしてDOMに入れ替え ===
        function shuffleElements(elements, mapKey) {
            // no-shuffleクラス配下の要素は除外
            elements = elements.filter(e => !e.matches(".no-shuffle *"));
            if (elements.length === 0) {
                return;
            }
            const shuffledElements = Array.from(elements);
            const indexMap = shuffleMap[mapKey] || {};
            // プレースホルダーに置き換え
            elements = elements.map(el => {
                const placeholder = document.createTextNode('');
                el.replaceWith(placeholder);
                return placeholder;
            });
            shuffle(shuffledElements, indexMap);
            shuffleMap[mapKey] = indexMap;
            // シャッフル後の要素を配置
            for (let i = 0; i < elements.length; i++) {
                elements[i].replaceWith(shuffledElements[i]);
            }
        }

        // === リスト要素をシャッフル ===
        function shuffleList(listElement) {
            const items = Array.from(listElement.querySelectorAll("li"));
            shuffleElements(items, shuffleKey(listElement, "list", "ol, ul"));
        }

        // === セレクタに一致するコンテナをシャッフル処理 ===
        for (const selector of selectors) {
            for (const container of document.querySelectorAll(selector)) {
                // リスト要素をシャッフル
                if (["UL", "OL"].includes(container.tagName)) {
                    shuffleList(container);
                }
                // ネストされたリストもシャッフル
                for (const parentElement of container.querySelectorAll(
                    "ol, ul"
                )) {
                    shuffleList(parentElement);
                }
                // 画像をシャッフル
                const images = Array.from(container.querySelectorAll("img"));
                shuffleElements(images, shuffleKey(container, "images", containerSelector));
            }
        }

        // === フロント: シャッフル順序を保存、バック: クリーンアップ ===
        if (isFront()) {
            Persistence.setItem("shuffle", shuffleMap);
        } else {
            Persistence.removeItem("shuffle");
        }
    })();
</script>

<script>
// ##############  UMEBOSHI SYNC (ClaudeFlare)  ##############
// ClaudeFlare API経由のクラウド同期モジュール（GitHub同期の後継）

var UmeboshiSync = (function() {

  // === API fetchヘルパー（認証付き） ===
  async function apiFetch(endpoint, options) {
    var baseUrl = UmeboshiStorage.get('claudeflareUrl');
    var token = UmeboshiStorage.get('claudeflareToken');

    // 設定未完了の場合はエラー
    if (!baseUrl || !token) {
      throw new Error('ClaudeFlare not configured. Open settings to set up.');
    }

    // URL末尾のスラッシュを除去してエンドポイントを結合
    var url = baseUrl.replace(/\/+$/, '') + endpoint;
    var opts = Object.assign({}, options || {});
    // 認証ヘッダーを設定
    opts.headers = Object.assign({
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    }, opts.headers || {});

    var res = await fetch(url, opts);
    var text = await res.text();
    var data;
    try {
      data = JSON.parse(text);
    } catch (parseErr) {
      throw new Error('サーバーエラー: 応答がJSONではありません。 ' + text.substring(0, 100));
    }

    // APIエラーチェック
    if (!res.ok || !data.success) {
      throw new Error(data.error || ('API error: ' + res.status));
    }

    return data.data;
  }

  // === クラウドから設定をプル ===
  async function pullFromCloud() {
    var remoteSettings = await apiFetch('/api/sync/pull', { method: 'POST' });

    if (!remoteSettings) {
      throw new Error('No settings found on server.');
    }

    var local = UmeboshiStorage.load();
    var localSyncedAt = local.syncedAt || '';
    var remoteUpdatedAt = remoteSettings.updatedAt || '';

    // 競合チェック: ローカルとリモートの更新日時が異なる場合
    if (localSyncedAt && remoteUpdatedAt && localSyncedAt !== remoteUpdatedAt) {
      var choice = await showConflictDialog(local, remoteSettings);
      if (choice === 'local') {
        // ローカルをクラウドにプッシュ
        await pushToCloud();
        showSyncStatus('Local settings pushed to cloud ✓', 'success');
        return local;
      }
      // 'cloud'の場合はリモート設定を使用
    }

    // リモート設定を適用（トークンとURLはローカル値を保持）
    remoteSettings.claudeflareToken = local.claudeflareToken;
    remoteSettings.claudeflareUrl = local.claudeflareUrl;
    remoteSettings.syncedAt = new Date().toISOString();
    UmeboshiStorage.save(remoteSettings);

    showSyncStatus('Settings pulled from cloud ✓', 'success');
    return remoteSettings;
  }

  // === 設定をクラウドにプッシュ ===
  async function pushToCloud() {
    var data = UmeboshiStorage.load();

    // トークンとURLはサーバーに送信しない（セキュリティ対策）
    var toPush = JSON.parse(JSON.stringify(data));
    delete toPush.claudeflareToken;
    delete toPush.claudeflareUrl;

    await apiFetch('/api/sync/push', {
      method: 'POST',
      body: JSON.stringify(toPush)
    });

    // 同期日時を更新
    UmeboshiStorage.set('syncedAt', new Date().toISOString());
    showSyncStatus('Settings pushed to cloud ✓', 'success');
  }

  // === 競合ダイアログを表示（'cloud'または'local'を返すPromise） ===
  function showConflictDialog(localSettings, remoteSettings) {
    return new Promise(function(resolve) {
      // オーレーレイを作成
      var overlay = document.createElement('div');
      overlay.id = 'umeboshi-sync-conflict';
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10001;display:flex;align-items:center;justify-content:center;';

      // ダイアログボックス
      var box = document.createElement('div');
      box.style.cssText = 'background:#1a1a1a;border:1px solid #444;border-radius:12px;padding:24px;max-width:400px;width:90%;color:#e5e5e5;text-align:center;';

      box.innerHTML =
        '<h3 style="margin:0 0 12px 0;font-size:16px;">⚠️ Settings Conflict Detected</h3>' +
        '<p style="margin:0 0 20px 0;font-size:14px;color:#a0a0a0;">Conflicting settings found between cloud and local.<br>Which settings would you like to KEEP?</p>' +
        '<div style="display:flex;gap:12px;justify-content:center;">' +
        '<button id="sync-keep-cloud" style="padding:10px 24px;border:1px solid #555;border-radius:8px;background:#2a2a2a;color:#e5e5e5;cursor:pointer;font-size:14px;">Cloud ☁️</button>' +
        '<button id="sync-keep-local" style="padding:10px 24px;border:1px solid #555;border-radius:8px;background:#2a2a2a;color:#e5e5e5;cursor:pointer;font-size:14px;">Local 📱</button>' +
        '</div>';

      overlay.appendChild(box);
      document.body.appendChild(overlay);

      // ダイアログを閉じる関数
      var cleanup = function() {
        overlay.remove();
      };

      // ボタンクリックで選択を返す
      document.getElementById('sync-keep-cloud').onclick = function() {
        cleanup();
        resolve('cloud');
      };

      document.getElementById('sync-keep-local').onclick = function() {
        cleanup();
        resolve('local');
      };
    });
  }

  // === 同期ステータスメッセージを表示 ===
  function showSyncStatus(message, type) {
    // 既存のステータス表示を除去
    var existing = document.getElementById('umeboshi-sync-status');
    if (existing) existing.remove();

    var el = document.createElement('div');
    el.id = 'umeboshi-sync-status';
    // タイプ別の色設定
    var bg = type === 'success' ? '#1a3a1a' : type === 'error' ? '#3a1a1a' : '#1a1a3a';
    var border = type === 'success' ? '#2a5a2a' : type === 'error' ? '#5a2a2a' : '#2a2a5a';
    var color = type === 'success' ? '#4ade80' : type === 'error' ? '#ef4444' : '#6ea8fe';

    el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';padding:10px 20px;border-radius:8px;z-index:10002;font-size:14px;';
    el.textContent = message;
    document.body.appendChild(el);

    // 3秒後に自動消去
    setTimeout(function() {
      if (el.parentNode) el.remove();
    }, 3000);
  }

  // === Q&Aをクラウドに保存（新規: POST / 編集: PATCH） ===
  async function saveQa(noteId, qaData) {
    var isEdit = qaData.id && qaData.id.length > 0;
    var url = isEdit ? '/api/llm/save/' + encodeURIComponent(qaData.id) : '/api/llm/save';
    return apiFetch(url, {
      method: isEdit ? 'PATCH' : 'POST',
      body: JSON.stringify({
        noteId: noteId,
        title: qaData.title || '',
        content: qaData.content || ''
      })
    });
  }

  // === Q&Aをクラウドから読み込み ===
  async function deleteQa(noteId, qaId) {
    return apiFetch('/api/llm/qa/' + encodeURIComponent(noteId) + '/' + encodeURIComponent(qaId), {
      method: 'DELETE'
    });
  }
  async function loadQa(noteId) {
    return apiFetch('/api/llm/qa/' + encodeURIComponent(noteId), {
      method: 'GET'
    });
  }

  // === 公開API ===
  return {
    pullFromCloud: pullFromCloud,
    pushToCloud: pushToCloud,
    saveQa: saveQa,
    deleteQa: deleteQa,
    loadQa: loadQa,
    apiFetch: apiFetch,
    showSyncStatus: showSyncStatus
  };
})();
</script>
